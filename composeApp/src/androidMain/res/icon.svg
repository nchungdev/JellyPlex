<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07101F"/>
      <stop offset="100%" style="stop-color:#0C1C30"/>
    </linearGradient>

    <!-- Bell -->
    <radialGradient id="bellGrad" cx="48%" cy="46%" r="52%">
      <stop offset="0%"   style="stop-color:#00D4A8;stop-opacity:0.88"/>
      <stop offset="52%"  style="stop-color:#008C80;stop-opacity:0.80"/>
      <stop offset="100%" style="stop-color:#003D35;stop-opacity:0.58"/>
    </radialGradient>
    <radialGradient id="bellShimmer" cx="38%" cy="24%" r="32%">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:0.38"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>

    <!-- Tentacles -->
    <linearGradient id="tentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#00E5CC;stop-opacity:1"/>
      <stop offset="60%"  style="stop-color:#00BFA5;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#00BFA5;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#7FFFD4;stop-opacity:1"/>
      <stop offset="65%"  style="stop-color:#00D4A8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00D4A8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="plusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#C8FFF4"/>
    </linearGradient>

    <filter id="bellGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="playHalo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="playSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="tentGlow" x="-40%" y="-5%" width="180%" height="110%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="streamGlow" x="-60%" y="-5%" width="220%" height="110%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bgGrad)"/>
  <ellipse cx="512" cy="460" rx="280" ry="230" fill="#00D4A8" opacity="0.05"/>

  <!-- ─────────────────────────────────────────────────────────────
       LAYOUT
       Container (bell)  : 3/4 of icon = 768px  → x [128‥896]  y [86‥814]
       Play ►            : 1/4 of icon = 256px  → centered at (512, 512)
       Frill             : y ≈ 812
       Tentacles         : y 826 → ~1050  (tua ra ngoài padding)
  ─────────────────────────────────────────────────────────────── -->

  <!-- ── BELL / CONTAINER ──────────────────────────────────────── -->
  <g filter="url(#bellGlow)">
    <path d="M 136 560
             Q 130 86 512 72
             Q 894 86 888 560
             Q 888 814 512 826
             Q 136 814 136 560 Z"
          fill="url(#bellGrad)"/>

    <!-- Shimmer highlight -->
    <path d="M 210 520
             Q 206 195 512 186
             Q 818 195 814 515
             Q 800 600 512 608
             Q 214 600 210 520 Z"
          fill="url(#bellShimmer)"/>

    <!-- Frill -->
    <path d="M 160 792
             Q 196 818 234 794 Q 272 818 310 794 Q 348 818 386 794
             Q 424 818 462 794 Q 512 812 562 794 Q 600 818 638 794
             Q 676 818 714 794 Q 752 818 790 794 Q 828 818 864 792"
          fill="none" stroke="#7FFFD4" stroke-width="10" stroke-linecap="round" opacity="0.70"/>

    <!-- Bioluminescent dots — upper bell only, clear of play area -->
    <circle cx="380" cy="295" r="12" fill="#E0FFF8" opacity="0.24"/>
    <circle cx="455" cy="198" r="9"  fill="#E0FFF8" opacity="0.20"/>
    <circle cx="512" cy="165" r="10" fill="#E0FFF8" opacity="0.22"/>
    <circle cx="569" cy="198" r="9"  fill="#E0FFF8" opacity="0.20"/>
    <circle cx="644" cy="295" r="12" fill="#E0FFF8" opacity="0.24"/>
  </g>

  <!-- ── PLAY = BIOLUMINESCENT GLOW, center (512,512), size ≈256px ─
       Triangle: left edge x=392 y[384‥640], tip x=648 y=512
       Height=256, Width=256  → 1/4 of 1024 ✓
  ── -->
  <!-- Layer 1: wide ambient halo -->
  <polygon points="392,384 392,640 648,512"
           fill="#A8FFF0" opacity="0.16" filter="url(#playHalo)"/>
  <!-- Layer 2: soft glow -->
  <polygon points="406,400 406,624 630,512"
           fill="#DFFFFA" opacity="0.30" filter="url(#playSoft)"/>
  <!-- Layer 3: crisp organic shape -->
  <polygon points="420,416 420,608 614,512"
           fill="#FFFFFF" opacity="0.42"/>
  <!-- Layer 4: top-left highlight edge -->
  <polygon points="420,416 420,454 468,436"
           fill="#FFFFFF" opacity="0.22"/>

  <!-- ── TENTACLES — tua ra phía dưới và hơi xủa ra 2 bên ──────
       7 tentacles, spacing 60px, center x=512
       x: 332 392 452 512 572 632 692
       Outer ones angle outward, all extend past y=900
  ── -->

  <!-- Wavy outer tentacles -->
  <g filter="url(#tentGlow)" opacity="0.88">
    <!-- far left → drifts to ~x=260 -->
    <path d="M 332 830
             C 305 878 342 918 312 966
             C 285 1010 316 1042 292 1072"
          fill="none" stroke="url(#tentGrad)" stroke-width="6.5" stroke-linecap="round"/>
    <!-- mid-left -->
    <path d="M 452 834
             C 428 884 464 924 440 972
             C 418 1014 452 1048 436 1074"
          fill="none" stroke="url(#tentGrad)" stroke-width="7.5" stroke-linecap="round"/>
    <!-- mid-right -->
    <path d="M 572 834
             C 596 884 560 924 584 972
             C 606 1014 572 1048 588 1074"
          fill="none" stroke="url(#tentGrad)" stroke-width="7.5" stroke-linecap="round"/>
    <!-- far right → drifts to ~x=764 -->
    <path d="M 692 830
             C 719 878 682 918 712 966
             C 739 1010 708 1042 732 1072"
          fill="none" stroke="url(#tentGrad)" stroke-width="6.5" stroke-linecap="round"/>
  </g>

  <!-- Streaming bar tentacles -->
  <g filter="url(#streamGlow)">
    <!-- x=392 -->
    <line x1="392" y1="832" x2="392" y2="1044" stroke="url(#barGrad)" stroke-width="7.5" stroke-linecap="round"/>
    <line x1="376" y1="892" x2="408" y2="892" stroke="#7FFFD4" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="376" y1="956" x2="408" y2="956" stroke="#7FFFD4" stroke-width="4.5" stroke-linecap="round" opacity="0.64"/>
    <line x1="376" y1="1016" x2="408" y2="1016" stroke="#7FFFD4" stroke-width="4"   stroke-linecap="round" opacity="0.40"/>

    <!-- x=512 center (thicker) -->
    <line x1="512" y1="828" x2="512" y2="1052" stroke="url(#barGrad)" stroke-width="9.5" stroke-linecap="round"/>
    <line x1="494" y1="886" x2="530" y2="886" stroke="#A8FFF0" stroke-width="5.5" stroke-linecap="round" opacity="0.90"/>
    <line x1="494" y1="950" x2="530" y2="950" stroke="#A8FFF0" stroke-width="5.5" stroke-linecap="round" opacity="0.68"/>
    <line x1="494" y1="1014" x2="530" y2="1014" stroke="#A8FFF0" stroke-width="5"   stroke-linecap="round" opacity="0.44"/>

    <!-- x=632 -->
    <line x1="632" y1="832" x2="632" y2="1044" stroke="url(#barGrad)" stroke-width="7.5" stroke-linecap="round"/>
    <line x1="616" y1="892" x2="648" y2="892" stroke="#7FFFD4" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="616" y1="956" x2="648" y2="956" stroke="#7FFFD4" stroke-width="4.5" stroke-linecap="round" opacity="0.64"/>
    <line x1="616" y1="1016" x2="648" y2="1016" stroke="#7FFFD4" stroke-width="4"   stroke-linecap="round" opacity="0.40"/>
  </g>

  <!-- ── PLUS — trên mặt bell góc trên phải ───────────────────── -->
  <circle cx="720" cy="220" r="54" fill="#00E5CC" opacity="0.10"/>
  <rect x="682" y="202" width="76" height="32" rx="16" ry="16" fill="url(#plusGrad)" opacity="0.92"/>
  <rect x="704" y="180" width="32" height="76" rx="16" ry="16" fill="url(#plusGrad)" opacity="0.92"/>

  <!-- Outer rim -->
  <rect width="1024" height="1024" rx="230" ry="230"
        fill="none" stroke="#00E5CC" stroke-width="4" opacity="0.08"/>
</svg>
